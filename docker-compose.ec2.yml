version: "3.9"

# EC2 deployment variant — dashboard + ml-predict only
# Producer runs separately on the EC2 producer host

services:
  ml-predict:
    build: ./ml_predict
    container_name: accident-ml-predict
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build: ./dashboard
    container_name: accident-dashboard
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - ML_PREDICT_URL=http://ml-predict:8001
    restart: unless-stopped
    depends_on:
      ml-predict:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
